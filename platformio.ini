; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

monitor_speed = 115200

lib_deps =
    bogde/HX711

; Flash over WiFi via ArduinoOTA once the board is no longer reachable over
; USB. Requires the board already running OTA-enabled firmware and reachable
; at OTA_HOSTNAME (see src/main.cpp) via mDNS.
[env:nodemcuv2-ota]
extends = env:nodemcuv2
upload_protocol = espota
upload_port = printery-abl-probe.local
